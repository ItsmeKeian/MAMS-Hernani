<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Municipal Aid Monitoring System</title>
    <link rel="icon" href="assets/img/logo.jpg">
    
    <!-- Bootstrap 5 CSS -->
    <link href="assets/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/index.css">

</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Header -->
            <div class="login-header">
                <div class="logo-placeholder">
                   <img class="logo" src="assets/img/logo.jpg" alt="logo">
                </div>
                <h1 class="system-title">Municipal Aid Monitoring System</h1>
                <p class="municipality-subtitle">Municipality of Hernani</p>
            </div>

            <!-- Form Body -->
            <div class="login-body">
                <form id="loginForm">
                    <div class="form-floating">
                        <input type="text" name="username" class="form-control" id="username" placeholder="Username" required>
                        <label for="username">
                            <i class="fas fa-user me-2"></i>Username
                        </label>
                    </div>

                    <div class="form-floating">
                        <input type="password" name="password" class="form-control" id="password" placeholder="Password" required>
                        <label for="password">
                            <i class="fas fa-lock me-2"></i>Password
                        </label>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="remember">
                            <label class="form-check-label small" for="remember">
                                Remember me
                            </label>
                        </div>
                        <a href="#" class="text-decoration-none small text-muted fw-semibold">Forgot Password?</a>
                    </div>

                    <button type="submit" id="login" class="btn btn-login text-white mb-3">
                        <i class="fas fa-sign-in-alt me-2"></i>Login to System
                    </button>
                </form>
            </div>

            <!-- Footer -->
            <div class="login-footer">
                <p class="footer-text mb-2">Secure login for authorized municipal personnel only</p>
                <div class="gov-badge">
                    <i class="fas fa-shield-alt"></i>
                    Official Government System
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/jquery-4.0.0.min.js"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="assets/css/all.min.css">


    <script>

            $("#loginForm").submit(function(e){

                e.preventDefault();

                $.ajax({

                    url: "php/login.php",
                    type: "POST",
                    data: $(this).serialize(),

                    success: function(res){

                        let data = JSON.parse(res);

                        if(data.status === "success"){

                            if(data.role === "admin"){

                                window.location = "admin/dashboard.php";

                            } else {

                                window.location = "user/dashboard.php";

                            }

                        }else{

                            alert(data.message);

                        }

                    }

                });

            });



    </script>
</body>
</html>
